<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aeonfall - Operational Manual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Roboto+Slab:wght@300;400;700&family=Special+Elite&family=MedievalSharp&family=Homemade+Apple&family=Pirata+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --arch-burgundy: #7a1d1d;
            --arch-gold: #bba683;
            --arch-parchment: #f4edd8;
            --arch-shadow: 0 10px 30px rgba(0,0,0,0.4);
            --charcoal-pencil: #262626; 
            --sage-note-bg: #cbd4ab; 
            --ui-pill-bg: #dbdbdb;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Roboto Slab', serif; 
            background-color: #0c0c0c; 
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            color: var(--charcoal-pencil);
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .dm-editable { 
            color: var(--charcoal-pencil) !important; 
            outline: none; 
            min-height: 1.2em;
        }
        .dm-editable * { color: inherit !important; background: transparent !important; }

        /* Blockquote / Indentation Styling */
        .dm-editable blockquote {
            border-left: 2px solid var(--arch-gold);
            padding-left: 1.5rem;
            margin-left: 1rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            font-style: italic;
            opacity: 0.9;
        }

        /* Definitions & Inline Assets */
        .definition-word {
            color: var(--arch-burgundy);
            border-bottom: 1px dashed var(--arch-burgundy);
            cursor: help;
            position: relative;
            font-weight: 700;
        }
        .definition-word:hover::after {
            content: attr(data-definition);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #262626;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 11px;
            width: max-content;
            max-width: 200px;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            font-family: 'Roboto Slab', serif;
            font-weight: 400;
            font-style: normal;
            line-height: 1.4;
            pointer-events: none;
            white-space: normal;
            text-align: center;
        }

        .inline-img-wrapper { margin: 20px 0; text-align: center; }
        .inline-arch-asset { 
            display: inline-block; 
            max-width: 100%; 
            border-radius: 8px; 
            border: 1px solid rgba(0,0,0,0.1); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: zoom-in;
        }

        /* Selection Bubble */
        #selection-bubble {
            position: fixed;
            z-index: 200000;
            background: var(--arch-burgundy);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            border: 2px solid var(--arch-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            user-select: none;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        /* Sidebar & Layout */
        #nav-toggle-btn {
            display: none;
            position: fixed; top: 20px; left: 20px; z-index: 2000;
            background: var(--arch-burgundy); color: white; width: 44px; height: 44px;
            border-radius: 50%; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; border: 2px solid var(--arch-gold);
        }

        #nav-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #nav-overlay.active { opacity: 1; pointer-events: auto; }

        .parchment-container {
            max-width: 1400px; margin: 0 auto; background: var(--arch-parchment);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.05);
            position: relative; display: flex; min-height: 100vh; border: 1px solid #dcd1b2; overflow: hidden;
        }

        .manual-nav {
            width: 300px; background: rgba(0,0,0,0.03); border-right: 1px solid rgba(0,0,0,0.1);
            padding: 40px 0; flex-shrink: 0; display: flex; flex-direction: column;
            transition: transform 0.3s ease; z-index: 1000; height: 100vh;
        }
        #nav-list { flex-grow: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--arch-burgundy) transparent; }

        @media (max-width: 1024px) { 
            #nav-toggle-btn { display: flex; }
            .manual-nav { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); background: var(--arch-parchment); } 
            .manual-nav.open { transform: translateX(0); } 
            .manual-body { padding: 80px 20px 140px 20px !important; }
        }

        .shelf-item { 
            font-family: 'Cinzel', serif; font-size: 11px; font-weight: 900; text-transform: uppercase; 
            color: var(--charcoal-pencil); padding: 12px 18px; margin-bottom: 6px; cursor: pointer; 
            border-radius: 4px; transition: 0.3s; border-left: 4px solid transparent; background: rgba(0,0,0,0.03);
            letter-spacing: 1px;
        }
        .shelf-item:hover { background: rgba(122, 29, 29, 0.05); border-left-color: var(--arch-burgundy); }
        .shelf-item.active { background: var(--arch-burgundy); color: white; border-left-color: var(--arch-gold); }

        .manual-body { flex-grow: 1; padding: 60px 60px 140px 60px; height: 100vh; overflow-y: auto; scroll-behavior: smooth; position: relative; }
        #manual-sections-container { display: flex; flex-direction: row; flex-wrap: wrap; align-items: flex-start; width: 100%; gap: 15px; }

        /* DM Pill Orchestration Bar */
        #dm-global-controls {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: none !important; 
            gap: 12px; padding: 12px 35px; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px); border-radius: 100px; border: 1px solid rgba(122, 29, 29, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); z-index: 10000; align-items: center;
        }
        #dm-global-controls.dm-active { display: flex !important; }

        .arch-btn { 
            font-family: 'Cinzel', serif; font-size: 10px; font-weight: 900; text-transform: uppercase; 
            padding: 8px 20px; border-radius: 30px; cursor: pointer; border: none; 
            background: var(--arch-burgundy); color: white; white-space: nowrap; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(122, 29, 29, 0.2); display: flex; align-items: center; gap: 8px;
        }
        .arch-btn:hover { background: #5a1515; transform: translateY(-1px); }

        /* Block Controls */
        .tuner-panel { 
            font-size: 8px; gap: 8px; padding: 10px 16px; flex-wrap: wrap; display: flex; align-items: center; 
            background: white; border: 1px solid var(--arch-gold); border-radius: 30px; margin-bottom: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
        }

        .tuner-num-input { border: 1px solid #ddd; width: 60px; text-align: center; border-radius: 6px; font-family: monospace; font-size: 13px; padding: 4px; color: var(--charcoal-pencil); }
        .format-tool-btn { font-weight: 900; border: 1px solid #ddd; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 11px; transition: 0.2s; background: #fff; color: var(--charcoal-pencil); }
        .format-tool-btn:hover { background: #f9f9f9; border-color: var(--arch-burgundy); }
        .format-tool-btn.active { background: var(--arch-burgundy); color: white; border-color: var(--arch-gold); }

        /* Components */
        .manual-h1 { font-family: 'Cinzel', serif; font-weight: 900; font-size: 65px; color: var(--arch-burgundy); text-transform: uppercase; margin-bottom: 5px; line-height: 0.9; letter-spacing: -2px; }
        .manual-h2 { font-family: 'Cinzel', serif; font-weight: 900; font-size: clamp(1.2rem, 4vw, 2.2rem); border-bottom: 4px double var(--arch-burgundy); padding-bottom: 8px; text-transform: uppercase; margin-bottom: 25px; width: 100%; letter-spacing: 2px; color: var(--arch-burgundy); }
        .manual-h3 { font-family: 'Cinzel', serif; font-weight: 700; font-size: clamp(1rem, 3vw, 1.4rem); border-bottom: 1px solid rgba(93, 64, 55, 0.4); padding-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; width: 100%; color: var(--charcoal-pencil); }

        .manual-note-box, .manual-info-box { border: 2px solid var(--arch-gold); border-radius: 20px; padding: 25px; margin-bottom: 25px; position: relative; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .manual-note-box { background: var(--sage-note-bg) !important; }

        .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: #1a0f0a; color: #f4edd8; padding: 12px 28px; border-radius: 40px; z-index: 2000000; opacity: 0; transition: opacity 0.3s; font-family: 'Cinzel'; font-size: 11px; font-weight: 900; border: 1px solid var(--arch-burgundy); pointer-events: none; }
        
        /* Prettier Role Pill Styling */
        .role-pill-outer { 
            background: var(--ui-pill-bg); 
            border-radius: 50px; 
            padding: 4px; 
            display: inline-flex; 
            border: 1px solid rgba(0,0,0,0.08); 
            width: 180px; 
            justify-content: space-between;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .role-tab { 
            flex: 1; 
            padding: 7px 0; 
            cursor: pointer; 
            border-radius: 50px; 
            font-size: 11px; 
            font-weight: 900; 
            text-transform: uppercase; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            color: #5d4037; 
            text-align: center;
        }
        .role-tab.active { 
            background: var(--arch-burgundy); 
            color: white; 
            box-shadow: 0 4px 12px rgba(122,29,29,0.35);
            transform: scale(1.02);
        }

        .aeon-size-span { display: inline-block; transition: font-size: 0.05s ease-out; line-height: 1.1; }

        /* Carousel Styles */
        .slider-bubble { background: #fff; border: 2px solid var(--arch-gold); border-radius: 20px; padding: 20px; box-shadow: 0 15px 45px rgba(0,0,0,0.1); width: 100%; margin-bottom: 2.5rem; position: relative; overflow: hidden; }
        .slider-viewport { position: relative; display: flex; align-items: center; justify-content: center; min-height: 250px; }
        .slide-container { display: none; width: 100%; text-align: center; }
        .slide-container.active { display: block; animation: fadeIn 0.4s ease; }
        .slide-asset { max-width: 100%; max-height: 600px; border-radius: 8px; cursor: zoom-in; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid rgba(0,0,0,0.05); }
        .slider-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: var(--arch-burgundy); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-weight: bold; border: 1px solid var(--arch-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s; }
        .arrow-left { left: 10px; }
        .arrow-right { right: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .system-hub-link {
            display: block;
            text-align: center;
            color: var(--arch-burgundy);
            font-weight: 900;
            text-transform: uppercase;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: -0.5px;
            transition: 0.2s;
            padding: 15px;
            border-top: 1px solid rgba(0,0,0,0.05);
            margin-top: auto;
        }
        .system-hub-link:hover { background: rgba(0,0,0,0.02); text-decoration: underline; }

        /* Drag & Drop Styles */
        .manual-section-unit { transition: opacity 0.2s, border 0.1s; }
        .unit-dragging { opacity: 0.3 !important; }
        .drop-zone-top { border-top: 5px solid var(--arch-burgundy) !important; }
        .drop-zone-bottom { border-bottom: 5px solid var(--arch-burgundy) !important; }
        .drop-zone-left { border-left: 5px solid var(--arch-burgundy) !important; }
        .drop-zone-right { border-right: 5px solid var(--arch-burgundy) !important; }
        .drag-handle-anchor { cursor: grab; padding: 6px; color: var(--arch-burgundy); font-size: 16px; opacity: 0.5; transition: 0.2s; user-select: none; }
        .drag-handle-anchor:hover { opacity: 1; }
        .drag-handle-anchor:active { cursor: grabbing; }

        .table-wrap { width: 100%; overflow-x: auto; background: white; border: 2px solid var(--arch-gold); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .manual-table { width: 100%; border-collapse: collapse; text-align: left; }
        .manual-table th { background: rgba(0,0,0,0.05); padding: 14px; font-family: 'Cinzel', serif; border-bottom: 2px solid var(--arch-burgundy); font-size: 11px; }
        .manual-table td { padding: 14px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 13px; color: var(--charcoal-pencil); }
        .manual-table tr:nth-child(even) { background-color: rgba(0,0,0,0.04); }
    </style>
    <script>
        // GLOBAL STATE & FUNCTIONS
        window.aeonState = {
            manualSections: [],
            manualHeader: { title: "OPERATIONS GUIDE", subtitle: "Archival sync." },
            activeRole: localStorage.getItem('aeonfall_role') || 'player',
            activeEditId: null,
            lockedSelection: null,
            saveTimer: null,
            deleteCallback: null,
            draggedId: null,
            dropSide: null
        };

        window.closeAllDropdowns = () => {};
        window.showToast = (m) => { 
            const t = document.getElementById('toast'); 
            if(t) { t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 3000); } 
        };
        window.toggleNav = () => { 
            document.getElementById('sidebar')?.classList.toggle('open'); 
            document.getElementById('nav-overlay')?.classList.toggle('active'); 
        };
        window.openDelModal = (text, callback) => {
            const txt = document.getElementById('del-modal-text');
            if (txt) txt.innerText = text;
            window.aeonState.deleteCallback = callback;
            document.getElementById('del-modal')?.classList.remove('hidden');
        };
        window.moveSlide = (id, dir) => {
            const slides = document.querySelectorAll(`#slider-${id} .slide-container`);
            if (!slides.length) return;
            let currentIdx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[currentIdx].classList.remove('active');
            let nextIdx = (currentIdx + dir + slides.length) % slides.length;
            slides[nextIdx].classList.add('active');
        };
    </script>
</head>
<body onclick="window.closeAllDropdowns()">

    <div id="toast" class="toast">Manual Synchronized</div>
    <div id="selection-bubble" onmousedown="window.toggleSelectionLock(event)">Select</div>

    <div id="nav-toggle-btn" onclick="window.toggleNav(); event.stopPropagation();">
        <span>☰</span>
    </div>

    <div id="nav-overlay" onclick="window.toggleNav()"></div>

    <!-- Auth Modal -->
    <div id="pass-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[110000] hidden p-4 text-black">
        <div class="bg-gray-800 p-8 rounded-2xl w-full max-w-sm border-2 border-amber-600 text-white text-center shadow-2xl" onclick="event.stopPropagation()">
            <h3 class="text-xl font-serif text-amber-500 font-bold mb-4 uppercase">Archive Authority</h3>
            <input type="password" id="dm-pass" class="w-full bg-gray-900 text-center text-2xl rounded-lg p-3 mb-8 border border-gray-700 text-amber-500 outline-none">
            <button onclick="window.authDm()" class="w-full bg-amber-600 hover:bg-amber-500 text-white py-4 rounded-xl font-bold uppercase text-xs">Verify Access</button>
            <button onclick="document.getElementById('pass-modal').classList.add('hidden')" class="text-[10px] text-gray-500 uppercase font-black mt-6 block w-full text-center">Cancel</button>
        </div>
    </div>

    <!-- Deletion Confirmation -->
    <div id="del-modal" class="fixed inset-0 z-[110000] flex items-center justify-center p-4 hidden text-black">
        <div class="absolute inset-0 bg-black/90" onclick="document.getElementById('del-modal').classList.add('hidden')"></div>
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm text-center relative z-10 shadow-2xl">
            <h3 class="text-xl font-serif font-black text-red-700 uppercase mb-4">Purge Record</h3>
            <p id="del-modal-text" class="text-xs text-slate-500 mb-8 italic">This entry will be lost.</p>
            <button id="confirm-del-btn" class="w-full bg-red-700 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg">Confirm erasure</button>
            <button onclick="document.getElementById('del-modal').classList.add('hidden')" class="w-full bg-gray-100 text-gray-400 py-3 rounded-xl font-bold uppercase text-[10px] mt-2">Cancel</button>
        </div>
    </div>

    <div id="lightbox-modal" class="hidden fixed inset-0 z-[120000] bg-black/90 flex items-center justify-center" onclick="this.classList.add('hidden')">
        <div id="lightbox-content" class="p-4 flex items-center justify-center w-full h-full"></div>
    </div>

    <div class="parchment-container">
        <!-- SIDEBAR -->
        <div class="manual-nav" id="sidebar">
            <div class="sidebar-header text-center p-6 pb-2">
                <h1 class="font-serif font-black text-4xl text-[#7a1d1d] uppercase leading-none tracking-tighter">Aeonfall</h1>
                <p class="font-sans text-[9px] uppercase font-bold tracking-[0.2em] opacity-40 mt-2 mb-1">Operational Manual</p>
                
                <div class="role-pill-outer mt-6 mb-4">
                    <div id="role-player" onclick="window.setRole('player')" class="role-tab active">Player</div>
                    <div id="role-dm" onclick="window.setRole('dm')" class="role-tab">DM</div>
                </div>
            </div>
            
            <div id="nav-list"></div>

            <a href="playershandbook.html" class="system-hub-link">
                ← SYSTEM HUB
            </a>
        </div>

        <!-- CONTENT -->
        <div class="manual-body" id="content-pane" onclick="window.closeAllDropdowns()">
            <div id="manual-header"></div>
            <div id="manual-sections-container"></div>
            
            <div id="dm-global-controls">
                <button onclick="window.addManualSection('heading')" class="arch-btn">🔗 GROUP</button>
                <button onclick="window.addManualSection('subheading')" class="arch-btn">📑 SUB</button>
                <button onclick="window.addManualSection('text')" class="arch-btn">✚ TEXT</button>
                <button onclick="window.addManualSection('table')" class="arch-btn">✚ TBL</button>
                <button onclick="window.addManualSection('note')" class="arch-btn">📑 NOTE</button>
                <button onclick="window.addManualSection('info')" class="arch-btn">📊 INFO</button>
                <button onclick="window.addManualSection('media')" class="arch-btn">🖼 CAROUSEL</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, updateDoc, setDoc, onSnapshot, addDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBLN0KhcnZFKZEYyR0O-Q2mZhKr-iyh7BI", authDomain: "aeonfall-523c1.firebaseapp.com", projectId: "aeonfall-523c1", storageBucket: "aeonfall-523c1.firebasestorage.app", messagingSenderId: "716207733913", appId: "1:716207733913:web:7aac43906a70e2b5f50c08" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'aeonfall-manager-v2';

        window.authDm = () => { 
            if(document.getElementById('dm-pass')?.value === 'Rew4994') { 
                window.aeonState.activeRole='dm'; 
                localStorage.setItem('aeonfall_role', 'dm'); 
                document.getElementById('pass-modal')?.classList.add('hidden'); 
                window.updateRoleUI(); 
            } else { 
                window.showToast("Authority Refused"); 
            } 
        };

        window.setRole = (r) => { 
            if(r === 'dm') document.getElementById('pass-modal')?.classList.remove('hidden'); 
            else { 
                window.aeonState.activeRole = 'player'; 
                localStorage.setItem('aeonfall_role', 'player'); 
                window.updateRoleUI(); 
            } 
        };

        window.updateRoleUI = () => { 
            const isDM = window.aeonState.activeRole === 'dm'; 
            document.body.classList.toggle('dm-mode-active', isDM); 
            const ctrl = document.getElementById('dm-global-controls');
            if (ctrl) isDM ? ctrl.classList.add('dm-active') : ctrl.classList.remove('dm-active');
            document.getElementById('role-dm')?.classList.toggle('active', isDM); 
            document.getElementById('role-player')?.classList.toggle('active', !isDM); 
            window.renderManual(); 
        };

        // Precision Sizing
        window.applySize = (size) => {
            if (!window.aeonState.lockedSelection) return;
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(window.aeonState.lockedSelection);
            if (sel.rangeCount === 0) return;
            const range = sel.getRangeAt(0);
            let container = range.commonAncestorContainer;
            if (container.nodeType === 3) container = container.parentElement;
            let targetSpan = container.closest('.aeon-size-span');
            if (targetSpan) {
                targetSpan.style.fontSize = size + 'px';
            } else {
                const span = document.createElement('span');
                span.className = 'aeon-size-span';
                span.style.fontSize = size + 'px';
                span.appendChild(range.extractContents());
                range.insertNode(span);
                const newRange = document.createRange();
                newRange.selectNodeContents(span);
                window.aeonState.lockedSelection = newRange;
            }

            // Persistence update: re-clone for stackability
            if (sel.rangeCount > 0) window.aeonState.lockedSelection = sel.getRangeAt(0).cloneRange();

            const editBox = container.closest('.dm-editable');
            if (editBox) {
                const id = editBox.getAttribute('data-id');
                if (id) window.dbUpdateSection(id, 'content', editBox.innerHTML);
            }
        };

        window.execFormat = (cmd, val = null) => {
            const sel = window.getSelection();
            if (window.aeonState.lockedSelection) {
                sel.removeAllRanges();
                sel.addRange(window.aeonState.lockedSelection);
            }
            document.execCommand(cmd, false, val);
            
            // CRITICAL: Re-clone range after DOM modification to allow stacking
            if (sel.rangeCount > 0) {
                window.aeonState.lockedSelection = sel.getRangeAt(0).cloneRange();
            }

            const focused = document.activeElement;
            if (focused && focused.classList.contains('dm-editable')) {
                const id = focused.getAttribute('data-id');
                if (id) window.dbUpdateSection(id, 'content', focused.innerHTML);
            }
        };

        window.insertTemplate = (type) => {
            const sel = window.getSelection();
            if (window.aeonState.lockedSelection) {
                sel.removeAllRanges();
                sel.addRange(window.aeonState.lockedSelection);
            }
            
            const tpl = type === 'img' ? '{{URL | Caption}}' : '[[Text | definition]]';
            window.execFormat('insertText', tpl);
        };

        window.toggleSelectionLock = (e) => {
            e.preventDefault(); e.stopPropagation();
            const bubble = document.getElementById('selection-bubble');
            if (window.aeonState.lockedSelection) {
                window.aeonState.lockedSelection = null;
                bubble.innerText = "Select";
                window.getSelection().removeAllRanges();
                bubble.style.display = "none";
                bubble.style.background = 'var(--arch-burgundy)';
            } else {
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.toString().trim().length > 0) {
                    window.aeonState.lockedSelection = sel.getRangeAt(0).cloneRange();
                    bubble.innerText = "Unselect";
                    bubble.style.background = "#22c55e"; 
                }
            }
        };

        // DRAG & DROP ENGINE
        window.handleDragStart = function(e, id) { 
            if (window.aeonState.activeRole !== 'dm') return; 
            window.aeonState.draggedId = id; 
            e.currentTarget.classList.add('unit-dragging'); 
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', id); 
        };

        window.handleDragOver = function(e) { 
            if (!window.aeonState.draggedId) return; 
            e.preventDefault(); 
            const el = e.currentTarget; 
            const rect = el.getBoundingClientRect(); 
            const relX = e.clientX - rect.left; 
            const relY = e.clientY - rect.top;

            el.classList.remove('drop-zone-left', 'drop-zone-right', 'drop-zone-top', 'drop-zone-bottom');
            if (relY < rect.height * 0.25) { window.aeonState.dropSide = 'top'; el.classList.add('drop-zone-top'); }
            else if (relY > rect.height * 0.75) { window.aeonState.dropSide = 'bottom'; el.classList.add('drop-zone-bottom'); }
            else if (relX < rect.width * 0.33) { window.aeonState.dropSide = 'left'; el.classList.add('drop-zone-left'); }
            else if (relX > rect.width * 0.66) { window.aeonState.dropSide = 'right'; el.classList.add('drop-zone-right'); }
        };

        window.handleDragLeave = function(e) { e.currentTarget.classList.remove('drop-zone-left', 'drop-zone-right', 'drop-zone-top', 'drop-zone-bottom'); };
        window.handleDragEnd = function(e) { e.currentTarget.classList.remove('unit-dragging'); };

        window.handleDrop = async function(e, targetId) { 
            e.preventDefault(); 
            e.currentTarget.classList.remove('drop-zone-left', 'drop-zone-right', 'drop-zone-top', 'drop-zone-bottom'); 
            if (!window.aeonState.draggedId || window.aeonState.draggedId === targetId) return; 

            // Find full group range if dragging a heading
            const getGroup = (id) => {
                const idx = window.aeonState.manualSections.findIndex(s => s.id === id);
                if (idx === -1) return [];
                const section = window.aeonState.manualSections[idx];
                if (section.type !== 'heading') return [section];
                
                const group = [section];
                for (let i = idx + 1; i < window.aeonState.manualSections.length; i++) {
                    if (window.aeonState.manualSections[i].type === 'heading') break;
                    group.push(window.aeonState.manualSections[i]);
                }
                return group;
            };

            const movedGroup = getGroup(window.aeonState.draggedId);
            const remaining = window.aeonState.manualSections.filter(s => !movedGroup.map(m => m.id).includes(s.id));
            let targetIdx = remaining.findIndex(s => s.id === targetId);
            
            const batch = writeBatch(db);
            const side = window.aeonState.dropSide;

            if (side === 'left' || side === 'right') {
                movedGroup.forEach(m => batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'manualSections', m.id), { width: 48 }));
                batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'manualSections', targetId), { width: 48 });
                if (side === 'right') targetIdx += 1;
            } else {
                movedGroup.forEach(m => batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'manualSections', m.id), { width: 100 }));
                if (side === 'bottom') targetIdx += 1;
            }

            remaining.splice(targetIdx, 0, ...movedGroup);
            remaining.forEach((sec, i) => { batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'manualSections', sec.id), { order: i }); }); 

            await batch.commit(); 
            window.aeonState.draggedId = null; 
            window.showToast("Archive Structural Sync");
        };

        // Table Ops
        window.addRow = async (id) => {
            const s = window.aeonState.manualSections.find(x => x.id === id); if (!s) return;
            const rows = JSON.parse(s.tableRows || '[]');
            rows.push(new Array((s.tableHeaders || ['Key','Val']).length).fill("..."));
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'manualSections', id), { tableRows: JSON.stringify(rows) });
        };
        window.remRow = async (id) => {
            const s = window.aeonState.manualSections.find(x => x.id === id); if (s) {
                const rows = JSON.parse(s.tableRows || '[]'); if (rows.length <= 1) return;
                rows.pop();
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'manualSections', id), { tableRows: JSON.stringify(rows) });
            }
        };

        // Firestore Sync
        window.dbUpdateSection = (id, field, val) => {
            if(window.aeonState.saveTimer) clearTimeout(window.aeonState.saveTimer);
            window.aeonState.saveTimer = setTimeout(async () => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'manualSections', id), { [field]: val });
                window.showToast("Archival Sync");
            }, 1000);
        };

        window.dbUpdateHeader = (field, val) => {
            if(window.aeonState.saveTimer) clearTimeout(window.aeonState.saveTimer);
            window.aeonState.saveTimer = setTimeout(async () => {
                try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'manualConfig', 'header'), { [field]: val }, { merge: true }); window.showToast("Header Sync"); } catch(e) {}
            }, 1000);
        };

        window.updateTableCell = (id, type, rIdx, val, cIdx = null) => {
            const s = window.aeonState.manualSections.find(x => x.id === id); if(!s) return;
            if(type === 'headers') {
                const h = [...s.tableHeaders]; h[rIdx] = val;
                window.dbUpdateSection(id, 'tableHeaders', h);
            } else {
                const r = JSON.parse(s.tableRows); r[rIdx][cIdx] = val;
                window.dbUpdateSection(id, 'tableRows', JSON.stringify(r));
            }
        };

        window.triggerManualDelete = (id) => {
            window.openDelModal('Purge archival segment?', async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'manualSections', id));
            });
        };

        window.addManualSection = async (type) => { 
            const data = { title: "NEW ENTRY", content: "Inscribe details...", type, order: window.aeonState.manualSections.length, width: 100, align: 'left', tableHeaders: type==='table'?['Key','Value']:null, tableRows: type==='table'?'[["Data","Data"]]':null, mediaUrl: "", mediaDescription: "" }; 
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'manualSections'), data); 
        };

        window.parseAeonfallContent = (text, isDM, sectionId) => {
            if (!text) return '';
            if (isDM && window.aeonState.activeEditId !== null) return text;
            let parsed = text;
            parsed = parsed.replace(/\[\[([^|\]]+)\|([^\]]+)\]\]/g, '<span class="definition-word" data-definition="$2">$1</span>');
            parsed = parsed.replace(/\{\{([^}|]+)(?:\|([^}]+))?\}\}/g, (m, url, desc) => {
                const trimmedUrl = url.trim();
                return `<div class="inline-img-wrapper"><img src="${trimmedUrl}" class="inline-arch-asset" onclick="window.openZoom(event, '${trimmedUrl}')">${desc ? `<div class="text-[10px] italic opacity-70 mt-1 text-center">${desc.trim()}</div>` : ''}</div>`;
            });
            return parsed;
        };

        window.renderManual = () => {
            // Guard: don't re-render while text is locked for stackable formatting
            if (window.aeonState.lockedSelection) return; 

            const isDM = window.aeonState.activeRole === 'dm';
            const container = document.getElementById('manual-sections-container');
            const headerEl = document.getElementById('manual-header');
            if(!container) return;

            if (headerEl) headerEl.innerHTML = `
                <h1 class="manual-h1 dm-editable" contenteditable="${isDM}" oninput="window.dbUpdateHeader('title', this.innerText)">${window.aeonState.manualHeader.title}</h1>
                <p class="dm-editable italic opacity-40 font-bold uppercase text-[9px] tracking-widest" contenteditable="${isDM}" oninput="window.dbUpdateHeader('subtitle', this.innerText)">${window.aeonState.manualHeader.subtitle}</p>
            `;

            document.getElementById('nav-list').innerHTML = window.aeonState.manualSections.filter(s => s.type === 'heading').map(s => `
                <div class="shelf-item" onclick="document.getElementById('section-${s.id}').scrollIntoView({behavior:'smooth'})">${s.title}</div>
            `).join('');

            container.innerHTML = window.aeonState.manualSections.map(s => {
                const style = `width: calc(${s.width ?? 100}% - 15px); text-align: ${s.align || 'left'};`;
                let contentHTML = '';
                
                if (s.type === 'table') {
                    contentHTML = `<div class="table-wrap">
                        ${isDM ? `<div class="flex gap-2 p-2 bg-gray-50 border-b"><button onclick="window.addRow('${s.id}')" class="format-tool-btn">+Row</button><button onclick="window.remRow('${s.id}')" class="format-tool-btn">-Row</button></div>` : ''}
                        <table class="manual-table">
                            <thead><tr>${(s.tableHeaders||['H1','H2']).map((h, i) => `<th contenteditable="${isDM}" oninput="window.updateTableCell('${s.id}','headers',${i},this.innerText)">${h}</th>`).join('')}</tr></thead>
                            <tbody>${JSON.parse(s.tableRows || '[]').map((row, rIdx) => `<tr>${row.map((c, cIdx) => `<td contenteditable="${isDM}" oninput="window.updateTableCell('${s.id}','rows',${rIdx},this.innerText,${cIdx})">${c}</td>`).join('')}</tr>`).join('')}</tbody>
                        </table>
                    </div>`;
                } else if (s.type === 'media') {
                    const urls = (s.mediaUrl || "").split(',').filter(x => x.trim());
                    const descs = (s.mediaDescription || "").split(',');
                    contentHTML = `<div class="slider-bubble" id="slider-${s.id}">
                        <div class="slider-viewport">
                            ${urls.length > 1 ? `<div class="slider-arrow arrow-left" onclick="window.moveSlide('${s.id}', -1)">←</div><div class="slider-arrow arrow-right" onclick="window.moveSlide('${s.id}', 1)">→</div>` : ''}
                            ${urls.map((l, i) => {
                                const url = l.trim();
                                const isVideo = url.toLowerCase().endsWith('.mp4');
                                return `<div class="slide-container ${i===0?'active':''}">
                                    ${isVideo ? `<video src="${url}" class="slide-asset" autoplay loop muted playsinline onclick="window.openZoom(event, '${url}')"></video>` : `<img src="${url}" class="slide-asset" onclick="window.openZoom(event, '${url}')">`}
                                    <div class="text-[11px] mt-4 opacity-70 text-center italic">${(descs[i] || "").trim()}</div>
                                </div>`;
                            }).join('')}
                        </div>
                        ${isDM ? `<div class="mt-6 pt-4 border-t border-black/10 flex flex-col gap-2">
                            <input type="text" class="w-full text-[10px] p-2 bg-black/5 border rounded" placeholder="Links (comma separated)" value="${s.mediaUrl || ''}" oninput="window.dbUpdateSection('${s.id}', 'mediaUrl', this.value)">
                            <input type="text" class="w-full text-[10px] p-2 bg-black/5 border rounded" placeholder="Captions (comma separated)" value="${s.mediaDescription || ''}" oninput="window.dbUpdateSection('${s.id}', 'mediaDescription', this.value)">
                        </div>` : ''}
                    </div>`;
                } else if (s.type === 'note' || s.type === 'info') {
                    contentHTML = `<div class="${s.type === 'note' ? 'manual-note-box' : 'manual-info-box'}">
                        <div class="text-[10px] font-bold uppercase mb-2 opacity-50">${s.type === 'note' ? '📑 Note' : '📊 Info'}</div>
                        <div class="dm-editable ${s.type==='note'?'italic':''}" data-id="${s.id}" contenteditable="${isDM}" onfocus="window.aeonState.activeEditId='${s.id}'" onblur="window.aeonState.activeEditId=null; window.renderManual()" oninput="window.dbUpdateSection('${s.id}','content',this.innerHTML)">${window.aeonState.activeEditId === s.id ? s.content : window.parseAeonfallContent(s.content, isDM, s.id)}</div>
                    </div>`;
                } else if (s.type === 'heading') {
                    contentHTML = `<h2 class="manual-h2 dm-editable" contenteditable="${isDM}" oninput="window.dbUpdateSection('${s.id}','title',this.innerText)">${s.title}</h2>`;
                } else if (s.type === 'subheading') {
                    contentHTML = `<h3 class="manual-h3 dm-editable" contenteditable="${isDM}" oninput="window.dbUpdateSection('${s.id}','title',this.innerText)">${s.title}</h3>`;
                } else {
                    contentHTML = `<div class="dm-editable leading-relaxed" data-id="${s.id}" contenteditable="${isDM}" onfocus="window.aeonState.activeEditId='${s.id}'" onblur="window.aeonState.activeEditId=null; window.renderManual()" oninput="window.dbUpdateSection('${s.id}','content',this.innerHTML)">${window.aeonState.activeEditId === s.id ? s.content : window.parseAeonfallContent(s.content, isDM, s.id)}</div>`;
                }

                return `<section id="section-${s.id}" class="manual-section-unit relative p-2" style="${style}" draggable="false" 
                    ondragstart="window.handleDragStart(event, '${s.id}')" ondragover="window.handleDragOver(event)" ondragleave="window.handleDragLeave(event)" ondragend="window.handleDragEnd(event)" ondrop="window.handleDrop(event, '${s.id}')">
                    ${isDM ? `<div class="tuner-panel">
                        <div class="drag-handle-anchor" onmousedown="document.getElementById('section-${s.id}').setAttribute('draggable', 'true')" onmouseup="document.getElementById('section-${s.id}').setAttribute('draggable', 'false')">⠿</div>
                        <div class="flex gap-1 border-r pr-2 mr-1">
                            <button class="format-tool-btn ${s.align==='left'?'active':''}" onclick="window.dbUpdateSection('${s.id}', 'align', 'left')">L</button>
                            <button class="format-tool-btn ${s.align==='center'?'active':''}" onclick="window.dbUpdateSection('${s.id}', 'align', 'center')">C</button>
                            <button class="format-tool-btn ${s.align==='right'?'active':''}" onclick="window.dbUpdateSection('${s.id}', 'align', 'right')">R</button>
                        </div>
                        <div class="flex gap-1 border-r pr-2 mr-1">
                            <button class="format-tool-btn" onclick="window.execFormat('bold')">B</button>
                            <button class="format-tool-btn" onclick="window.execFormat('italic')">I</button>
                            <button class="format-tool-btn" onclick="window.execFormat('underline')">U</button>
                        </div>
                        <div class="flex gap-1 border-r pr-2 mr-1">
                            <button class="format-tool-btn" title="Indent" onclick="window.execFormat('indent')">⇥</button>
                            <button class="format-tool-btn" title="Outdent" onclick="window.execFormat('outdent')">⇤</button>
                        </div>
                        <div class="flex gap-1 border-r pr-2 mr-1">
                            <button class="format-tool-btn" title="Image Wrap" onclick="window.insertTemplate('img')">IMG</button>
                            <button class="format-tool-btn" title="Definition Wrap" onclick="window.insertTemplate('def')">DEF</button>
                        </div>
                        <div class="flex items-center gap-1">
                            <span class="text-[8px] font-bold">SIZE</span>
                            <input type="range" min="1" max="200" value="14" oninput="this.nextElementSibling.value=this.value; window.applySize(this.value)">
                            <input type="number" class="tuner-num-input" value="14" oninput="this.previousElementSibling.value=this.value; window.applySize(this.value)">
                        </div>
                        <button onclick="window.triggerManualDelete('${s.id}')" class="ml-auto text-red-700 font-black">✕</button>
                    </div>` : ''}
                    ${contentHTML}
                </section>`;
            }).join('');
        };

        // UI Listeners
        window.openZoom = (e, url) => { 
            if (e) e.stopPropagation(); if (!url) return;
            const modal = document.getElementById('lightbox-modal'); 
            const content = document.getElementById('lightbox-content'); 
            const isVideo = url.toLowerCase().endsWith('.mp4');
            content.innerHTML = isVideo 
                ? `<video src="${url}" class="max-w-[95vw] max-h-[85vh] object-contain border-2 border-white shadow-2xl" autoplay loop muted playsinline></video>`
                : `<img src="${url}" class="max-w-[95vw] max-h-[85vh] object-contain border-2 border-white shadow-2xl">`;
            modal.classList.remove('hidden'); 
        };

        document.addEventListener('mouseup', (e) => {
            if (window.aeonState.activeRole !== 'dm') return;
            const bubble = document.getElementById('selection-bubble');
            // Allow bubble to persist if already locked or interacting with toolbar
            if (window.aeonState.lockedSelection || e.target.closest('.tuner-panel') || e.target.closest('#selection-bubble')) return;
            const sel = window.getSelection();
            if (sel.toString().trim().length > 0) {
                bubble.style.display = 'block';
                bubble.style.top = (e.clientY - 60) + 'px';
                bubble.style.left = (e.clientX + 10) + 'px';
            } else { bubble.style.display = 'none'; }
        });

        onAuthStateChanged(auth, u => { 
            if (!u) return;
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'manualConfig', 'header'), d => { if (d.exists()) { window.aeonState.manualHeader = d.data(); window.renderManual(); } }); 
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'manualSections'), snap => { 
                window.aeonState.manualSections = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order ?? 0) - (b.order ?? 0)); 
                window.renderManual(); 
            }); 
            window.updateRoleUI(); 
        });

        const confirmBtn = document.getElementById('confirm-del-btn');
        if (confirmBtn) { confirmBtn.onclick = async () => { if (window.aeonState.deleteCallback) await window.aeonState.deleteCallback(); document.getElementById('del-modal')?.classList.add('hidden'); }; }

        signInAnonymously(auth);
    </script>
</body>
</html>
